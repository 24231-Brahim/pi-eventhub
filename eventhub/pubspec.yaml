name: eventhub
description: "EventHub - Mobile event management platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  go_router: ^14.8.1
  dio: ^5.7.0
  intl: ^0.20.2
  equatable: ^2.0.7
  dartz: ^0.10.1
  get_it: ^8.0.3
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.6
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  shimmer: ^3.0.0
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
