# ===========================================
# Server Configuration
# ===========================================
server.port=9090
spring.application.name=eventhub

# ===========================================
# H2 Database Configuration (dev)
# ===========================================
spring.datasource.url=jdbc:h2:mem:eventhubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=eventhubSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024
jwt.expiration=86400000

# ===========================================
# Swagger Configuration
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================================
# Logging
# ===========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.brahim.eventhub=DEBUG