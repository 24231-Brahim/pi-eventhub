name: eventhub_app
description: EventHub – Event management mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client
  http: ^1.2.1

  # QR code display
  qr_flutter: ^4.1.0

  # QR code scanner
  mobile_scanner: ^5.2.3

  # Local storage (JWT)
  shared_preferences: ^2.3.1

  # Internationalisation
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
